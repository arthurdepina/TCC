<svg width="100%" viewBox="0 0 680 1020" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Fluxograma da metodologia do TCC</title>
  <desc>Fluxograma com as etapas da metodologia do projeto, da seleção dos canais à análise estatística.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Seleção dos canais -->
  <rect x="190" y="20" width="300" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Seleção dos canais</text>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="Arial, sans-serif" font-size="12">12 canais · profissionais vs. amadores</text>
  <line x1="340" y1="76" x2="340" y2="110" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Coleta -->
  <rect x="190" y="110" width="300" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="132" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Coleta de dados</text>
  <text x="340" y="152" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="Arial, sans-serif" font-size="12">42.372 comentários · YouTube Data API v3</text>
  <line x1="340" y1="166" x2="340" y2="200" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Limpeza -->
  <rect x="190" y="200" width="300" height="56" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" fill="rgb(8,80,65)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Limpeza e pré-processamento</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central" fill="rgb(15,110,86)" font-family="Arial, sans-serif" font-size="12">text_clean (BERTimbau) e text_preprocessed</text>
  <line x1="340" y1="256" x2="340" y2="290" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rotulação LLM -->
  <rect x="190" y="290" width="300" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="340" y="312" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Rotulação com LLM</text>
  <text x="340" y="332" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="Arial, sans-serif" font-size="12">Claude Haiku · positivo, negativo, tangencial</text>
  <line x1="340" y1="346" x2="340" y2="380" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Amostragem -->
  <rect x="190" y="380" width="300" height="56" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="340" y="402" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Amostragem para revisão humana</text>
  <text x="340" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-family="Arial, sans-serif" font-size="12">600 comentários estratificados · 2 revisoras</text>
  <line x1="340" y1="436" x2="340" y2="470" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embeddings -->
  <rect x="190" y="470" width="300" height="56" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="492" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Geração de embeddings</text>
  <text x="340" y="512" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">BERTimbau · vetores de 768 dimensões</text>
  <line x1="340" y1="526" x2="340" y2="560" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Treinamento -->
  <rect x="190" y="560" width="300" height="56" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="582" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Treinamento e predição</text>
  <text x="340" y="602" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">XGBoost · divisão half-split · acurácia 84,8%</text>
  <line x1="340" y1="616" x2="340" y2="650" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Validação cruzada -->
  <rect x="190" y="650" width="300" height="56" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="672" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Validação cruzada</text>
  <text x="340" y="692" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">5-fold stratified · F1-macro 0,73</text>
  <line x1="340" y1="706" x2="340" y2="740" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Dataset final -->
  <rect x="190" y="740" width="300" height="56" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="762" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Construção do dataset final</text>
  <text x="340" y="782" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">Cruzamento predições + metadados · 16.719 linhas</text>
  <line x1="340" y1="796" x2="340" y2="830" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Confiança percebida -->
  <rect x="190" y="830" width="300" height="66" rx="8" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="852" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Heurística de confiança percebida</text>
  <text x="340" y="872" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">Léxica com tratamento de negação</text>
  <text x="340" y="888" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-family="Arial, sans-serif" font-size="12">classificação: ALTA / BAIXA / NEUTRA</text>
  <line x1="340" y1="896" x2="340" y2="930" stroke="rgb(115,114,108)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Análise estatística -->
  <rect x="190" y="930" width="300" height="56" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="340" y="952" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-family="Arial, sans-serif" font-size="14" font-weight="500">Análise estatística</text>
  <text x="340" y="972" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-family="Arial, sans-serif" font-size="12">6 perguntas de pesquisa · qui-quadrado e Kappa</text>

  <!-- Legenda -->
  <rect x="40" y="470" width="12" height="12" rx="2" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="1"/>
  <text x="58" y="481" fill="rgb(61,61,58)" font-family="Arial, sans-serif" font-size="12">Coleta e limpeza</text>
  <rect x="40" y="492" width="12" height="12" rx="2" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="1"/>
  <text x="58" y="503" fill="rgb(61,61,58)" font-family="Arial, sans-serif" font-size="12">Rotulagem</text>
  <rect x="40" y="514" width="12" height="12" rx="2" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="1"/>
  <text x="58" y="525" fill="rgb(61,61,58)" font-family="Arial, sans-serif" font-size="12">Modelagem</text>
  <rect x="40" y="536" width="12" height="12" rx="2" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="1"/>
  <text x="58" y="547" fill="rgb(61,61,58)" font-family="Arial, sans-serif" font-size="12">Análise</text>
</svg>
